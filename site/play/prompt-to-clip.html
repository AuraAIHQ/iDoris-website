<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>一句话变动画短片 · Prompt to clip · iDoris playground</title>
<style>
  :root{--paper:#F4F1EC;--ink:#26241f;--dim:#8a8578;--line:#d9d3c8;--orange:#FF5233;--cyan:#49C7E6;--green:#2Fae7e;--mono:ui-monospace,Menlo,monospace}
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:var(--paper);color:var(--ink);font-family:var(--mono);-webkit-font-smoothing:antialiased}
  body{padding:14px;max-width:560px;margin:0 auto}
  .lang{position:fixed;right:10px;top:10px;display:flex;gap:4px;z-index:5}
  .lang button{font:inherit;font-size:11px;padding:4px 8px;border:1px solid var(--line);background:#fff;color:var(--dim);border-radius:6px;cursor:pointer}
  .lang button.on{border-color:var(--orange);color:var(--orange)}
  h1{font-size:16px;margin:0 0 2px}
  .sub{font-size:12px;color:var(--dim);margin:0 0 12px;line-height:1.5}
  .out{border:1px solid var(--line);border-radius:12px;background:#111;width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  .out img{width:100%;height:100%;object-fit:contain;image-rendering:auto}
  .out .ph{color:var(--dim);font-size:12px;text-align:center;padding:20px}
  .out .spin{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(17,17,17,.85);color:#eee;font-size:12px;flex-direction:column;gap:8px;text-align:center;padding:20px}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
  .chips button{font:inherit;font-size:11px;padding:6px 10px;border:1px solid var(--line);background:#fff;color:var(--dim);border-radius:999px;cursor:pointer}
  .chips button:hover{border-color:var(--orange);color:var(--orange)}
  input.p{width:100%;font:inherit;font-size:14px;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)}
  .go{font:inherit;font-size:14px;padding:11px 16px;border:1px solid var(--orange);background:var(--orange);color:#fff;border-radius:10px;cursor:pointer;margin-top:10px;width:100%}
  .go:disabled{opacity:.5;cursor:not-allowed}
  .bar{font-size:11px;color:var(--dim);margin-top:8px;min-height:16px}
  .foot{font-size:11px;color:var(--dim);margin-top:12px;line-height:1.6}
  .foot b{color:var(--green)}
</style>
</head>
<body>
<div class="lang">
  <button data-l="zh">中</button><button data-l="en" class="on">EN</button><button data-l="th">ไทย</button>
</div>
<h1 data-i="title">一句话变动画短片</h1>
<p class="sub" data-i="sub">写一句你想看到的画面，AI 生成一段几秒的动画。跑在我们自己部署的 GPU 上，按实际用量扣积分（视频比出图贵一些）。</p>

<div class="out" id="out"><div class="ph" data-i="ph">写一句，点下面「生成」</div></div>

<div class="chips" id="chips"></div>
<input class="p" id="prompt" data-i-ph="pph" placeholder="想看什么动起来？">
<button class="go" id="go" data-i="gobtn">🎬 生成短片</button>
<div class="bar" id="bar">·</div>

<p class="foot" data-i="foot"><b>怎么做到的：</b>用的是 AnimateDiff-Lightning——在文生图的扩散模型上加了一个「运动模块」，它懂得帧与帧之间该怎么连贯地动。你的句子先被理解成画面，再一次生成好几帧、拼成一小段动画（GIF）。「Lightning」是蒸馏过的加速版，几步就出结果。模型跑在<b>我们自己部署的 GPU（Modal）</b>上，按实际耗时折算积分（视频系数更高）。这是我们自建、可计量的视频后端。</p>

<script>
(function(){
  var I18N={
    zh:{title:"一句话变动画短片",sub:"写一句你想看到的画面，AI 生成一段几秒的动画。跑在我们自己部署的 GPU 上，按实际用量扣积分（视频比出图贵一些）。",
        ph:"写一句，点下面「生成」",pph:"想看什么动起来？例：一只柯基在草地上奔跑，阳光",gobtn:"🎬 生成短片",
        gen:"AI 正在生成动画…（首次唤醒 GPU 稍久，约十几秒）",empty:"先写一句",needTop:"余额不足（视频每次较贵），先去 /buy 充值",spent:"扣 %s 积分 · 余 %s",err:"出错了，稍后再试",bal:"余额 %s 积分",
        chips:["柯基在草地奔跑","樱花花瓣飘落","咖啡杯冒热气","星空缓缓旋转"],
        foot:"<b>怎么做到的：</b>用的是 AnimateDiff-Lightning——在文生图的扩散模型上加了一个「运动模块」，它懂得帧与帧之间该怎么连贯地动。你的句子先被理解成画面，再一次生成好几帧、拼成一小段动画（GIF）。「Lightning」是蒸馏过的加速版，几步就出结果。模型跑在<b>我们自己部署的 GPU（Modal）</b>上，按实际耗时折算积分（视频系数更高）。这是我们自建、可计量的视频后端。"},
    en:{title:"A clip from one sentence",sub:"Type a scene you want to see; AI generates a few-second animation. Runs on our own GPU; credits by actual usage (video costs a bit more than a still image).",
        ph:"Type a line and hit Generate",pph:"What should move? e.g. a corgi running on grass, sunny",gobtn:"🎬 Generate clip",
        gen:"AI is generating the animation… (first run wakes the GPU, ~10-15s)",empty:"Type a line first",needTop:"Not enough credits (video costs more) — top up at /buy",spent:"−%s credits · %s left",err:"Something went wrong, try again",bal:"Balance %s credits",
        chips:["A corgi running on grass","Cherry blossom petals falling","Steam rising from a coffee cup","A starry sky slowly rotating"],
        foot:"<b>How it works:</b> This uses AnimateDiff-Lightning — a 'motion module' added on top of a text-to-image diffusion model that knows how frames should move coherently. Your sentence is understood as a scene, then several frames are generated at once and stitched into a short animation (GIF). 'Lightning' is a distilled fast version, done in a few steps. It runs on <b>our own deployed GPU (Modal)</b>, credits by actual time (higher video coefficient). Our own, meterable video backend."},
    th:{title:"คลิปจากประโยคเดียว",sub:"พิมพ์ฉากที่อยากเห็น AI สร้างแอนิเมชันสองสามวินาที รันบน GPU ของเราเอง หักเครดิตตามการใช้จริง (วิดีโอแพงกว่าภาพนิ่งนิดหน่อย)",
        ph:"พิมพ์แล้วกดสร้าง",pph:"อยากให้อะไรเคลื่อนไหว? เช่น คอร์กี้วิ่งบนหญ้า แดดออก",gobtn:"🎬 สร้างคลิป",
        gen:"AI กำลังสร้างแอนิเมชัน… (ครั้งแรกปลุก GPU ~10-15 วินาที)",empty:"พิมพ์ก่อน",needTop:"เครดิตไม่พอ (วิดีโอแพงกว่า) — เติมที่ /buy",spent:"−%s เครดิต · เหลือ %s",err:"เกิดข้อผิดพลาด ลองใหม่",bal:"ยอด %s เครดิต",
        chips:["คอร์กี้วิ่งบนหญ้า","กลีบซากุระร่วง","ไอร้อนจากแก้วกาแฟ","ท้องฟ้าดาวหมุนช้า"],
        foot:"<b>ทำงานอย่างไร:</b> ใช้ AnimateDiff-Lightning — 'โมดูลการเคลื่อนไหว' บนโมเดล diffusion ที่รู้ว่าเฟรมควรขยับอย่างต่อเนื่องอย่างไร ประโยคของคุณถูกเข้าใจเป็นฉาก แล้วสร้างหลายเฟรมพร้อมกันต่อเป็นแอนิเมชันสั้น (GIF) รันบน <b>GPU ที่เราติดตั้งเอง (Modal)</b> หักเครดิตตามเวลาจริง (สัมประสิทธิ์วิดีโอสูงกว่า)"}
  };
  var lang="en", W=null, busy=false;
  function q(s){return document.querySelector(s);} function qa(s){return document.querySelectorAll(s);}
  function d(){return I18N[lang]||I18N.en;}
  function wallet(){ var w=null; try{w=localStorage.getItem('idoris_wallet');}catch(e){}
    if(!/^[a-f0-9]{12,40}$/.test(w||'')){ w=(crypto.randomUUID?crypto.randomUUID().replace(/-/g,''):(Date.now().toString(16)+Math.floor(Math.random()*1e12).toString(16))).slice(0,24); try{localStorage.setItem('idoris_wallet',w);}catch(e){} } return w; }
  W=wallet();
  try{ var ul=new URLSearchParams(location.search).get("lang"); if(ul&&I18N[ul]) lang=ul; }catch(e){}
  function renderChips(){ q("#chips").textContent=""; (d().chips||[]).forEach(function(c){ var b=document.createElement("button"); b.textContent=c; b.onclick=function(){ q("#prompt").value=c; }; q("#chips").appendChild(b); }); }
  function applyLang(){ var t=d();
    qa("[data-i]").forEach(function(el){ var k=el.getAttribute("data-i"); if(t[k]!=null) el.innerHTML=t[k]; });
    qa("[data-i-ph]").forEach(function(el){ var k=el.getAttribute("data-i-ph"); if(t[k]!=null) el.placeholder=t[k]; });
    document.documentElement.lang=lang;
    qa(".lang button").forEach(function(b){ b.classList.toggle("on", b.getAttribute("data-l")===lang); });
    renderChips();
  }
  qa(".lang button").forEach(function(b){ b.onclick=function(){ lang=b.getAttribute("data-l"); applyLang(); loadBal(); }; });
  function loadBal(){ fetch('/api/balance?code='+encodeURIComponent(W)).then(function(r){return r.json();}).then(function(x){ if(!busy) q("#bar").textContent=d().bal.replace("%s",(x.remaining||0).toLocaleString()); }).catch(function(){}); }

  function showPh(text){ q("#out").textContent=""; var el=document.createElement("div"); el.className="ph"; el.textContent=String(text==null?"":text); q("#out").appendChild(el); }
  var VID_OK=/^data:image\/(gif|png|webp);base64,[A-Za-z0-9+/=]+$/;

  q("#go").onclick=async function(){
    if(busy) return;
    var prompt=(q("#prompt").value||"").trim();
    if(!prompt){ q("#bar").textContent=d().empty; return; }
    busy=true; q("#go").disabled=true;
    q("#out").textContent=""; var sp=document.createElement("div"); sp.className="spin"; sp.textContent="🎬 "+d().gen; q("#out").appendChild(sp);
    try{
      var r=await fetch('/api/clip',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({code:W, prompt:prompt.slice(0,400)})});
      var x=await r.json();
      if(!r.ok){ showPh((x.error==='insufficient'||x.error==='no_wallet')?d().needTop:(x.detail||d().err)); busy=false; q("#go").disabled=false; loadBal(); return; }
      if(typeof x.video==="string" && VID_OK.test(x.video)){
        q("#out").textContent=""; var im=document.createElement("img"); im.src=x.video; im.alt="clip"; q("#out").appendChild(im);
        q("#bar").textContent=d().spent.replace("%s",x.spent).replace("%s",(x.remaining||0).toLocaleString());
      } else { showPh(d().err); }
    }catch(e){ showPh(d().err); }
    busy=false; q("#go").disabled=false;
  };

  applyLang(); loadBal();
})();
</script>
</body>
</html>
