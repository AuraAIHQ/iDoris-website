<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>给孩子办画展 · Kids art gallery · iDoris playground</title>
<style>
  :root{--paper:#F4F1EC;--ink:#26241f;--dim:#8a8578;--line:#d9d3c8;--orange:#FF5233;--cyan:#49C7E6;--green:#2Fae7e;--mono:ui-monospace,Menlo,monospace}
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:var(--paper);color:var(--ink);font-family:var(--mono);-webkit-font-smoothing:antialiased}
  body{padding:14px;max-width:820px;margin:0 auto}
  .lang{position:fixed;right:10px;top:10px;display:flex;gap:4px;z-index:5}
  .lang button{font:inherit;font-size:11px;padding:4px 8px;border:1px solid var(--line);background:#fff;color:var(--dim);border-radius:6px;cursor:pointer}
  .lang button.on{border-color:var(--orange);color:var(--orange)}
  h1{font-size:16px;margin:0 0 2px}
  .sub{font-size:12px;color:var(--dim);margin:0 0 12px;line-height:1.5}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
  .chips button{font:inherit;font-size:11px;padding:6px 10px;border:1px solid var(--line);background:#fff;color:var(--dim);border-radius:999px;cursor:pointer}
  .chips button:hover{border-color:var(--orange);color:var(--orange)}
  .in{display:flex;gap:8px}
  .in textarea{flex:1;font:inherit;font-size:14px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);resize:vertical;min-height:46px}
  .go{font:inherit;font-size:14px;padding:0 18px;border:1px solid var(--orange);background:var(--orange);color:#fff;border-radius:10px;cursor:pointer;white-space:nowrap}
  .go:disabled{opacity:.5;cursor:not-allowed}
  .bar{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--dim);margin:10px 0 6px}
  .bar .tabs button{font:inherit;font-size:11px;padding:4px 10px;border:1px solid var(--line);background:#fff;color:var(--dim);border-radius:6px;cursor:pointer;margin-left:4px}
  .bar .tabs button.on{border-color:var(--orange);color:var(--orange)}
  .stage{border:1px solid var(--line);border-radius:12px;background:#fff;overflow:hidden;min-height:420px;position:relative}
  iframe{display:block;width:100%;height:60vh;min-height:420px;border:0;background:#fff}
  pre.code{margin:0;padding:14px;font-size:12px;line-height:1.5;white-space:pre-wrap;word-break:break-word;max-height:60vh;overflow:auto;color:var(--ink);display:none}
  .veil{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:var(--paper);color:var(--dim);font-size:13px;text-align:center;padding:20px}
  .spin{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(244,241,236,.9);font-size:13px;color:var(--dim);z-index:2}
  .foot{font-size:11px;color:var(--dim);margin-top:12px;line-height:1.6}
  .foot b{color:var(--green)}
  .dl{font-size:11px;color:var(--orange);cursor:pointer;text-decoration:underline;background:none;border:0;font-family:inherit}
</style>
</head>
<body>
<div class="lang">
  <button data-l="zh">中</button><button data-l="en" class="on">EN</button><button data-l="th">ไทย</button>
</div>
<h1 data-i="title">给孩子办一场线上画展</h1>
<p class="sub" data-i="sub">说说你家孩子画了什么，AI 当场做一个会发光、能滚动的在线画廊，右边直接看。生成在我们自己的后端跑，按用量扣积分。</p>

<div class="chips" id="chips"></div>
<div class="in">
  <textarea id="prompt" data-i-ph="ph" placeholder="孩子画了什么？"></textarea>
  <button class="go" id="go" data-i="gobtn">生成 →</button>
</div>

<div class="bar">
  <span id="status">·</span>
  <span class="tabs"><button id="tPrev" class="on" data-i="tabPrev">预览</button><button id="tCode" data-i="tabCode">代码</button> <button class="dl" id="dl" data-i="dl" style="display:none">下载 HTML</button></span>
</div>

<div class="stage">
  <iframe id="frame" sandbox="allow-scripts allow-forms" title="preview"></iframe>
  <pre class="code" id="code"></pre>
  <div class="veil" id="veil" data-i="veil">左边说一句，点「生成」——画廊会出现在这里</div>
  <div class="spin" id="spin" style="display:none" data-i="gen">AI 正在布置画廊…</div>
</div>

<p class="foot" data-i="foot"><b>怎么做到的：</b>你的描述被送到我们的 Cloudflare Worker，让跑在 Cloudflare 平台上的大模型直接吐出一整页自包含的 HTML 画廊（样式动画都在里面，画作位用彩色渐变块占位）。这页在一个<b>隔离沙箱 iframe</b> 里预览，碰不到本站数据。你可以「下载 HTML」，再把孩子真实的画替换进去。按 token 用量扣积分（最低 2 分）。</p>
